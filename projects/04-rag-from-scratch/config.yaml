groq:
  model: llama-3.3-70b-versatile
  base_url: https://api.groq.com/openai/v1

embeddings:
  model: all-MiniLM-L6-v2
  chunk_size: 500
  chunk_overlap: 50

retrieval:
  top_k: 3

chromadb:
  persist_directory: ./chroma_db
  collection_name: devops_docs

s3:
  bucket_name: ""          # set via CHROMA_S3_BUCKET env var
  chroma_prefix: chroma_db/
  docs_prefix: docs/
