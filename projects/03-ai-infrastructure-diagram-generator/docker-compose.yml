version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: infra-diagram-backend
    ports:
      - "8000:8000"
    environment:
      # LLM
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama3-8b-8192}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Local vector store fallback
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8001
      - LOG_LEVEL=info
      # AWS (optional — set in .env to enable AWS mode)
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_BEDROCK_ENABLED=${AWS_BEDROCK_ENABLED:-false}
      - AWS_S3_ENABLED=${AWS_S3_ENABLED:-false}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-}
      - AWS_DYNAMODB_ENABLED=${AWS_DYNAMODB_ENABLED:-false}
      - AWS_DYNAMODB_TABLE=${AWS_DYNAMODB_TABLE:-infra-diagram-history}
    volumes:
      - ./backend:/app
      - diagram_output:/app/output
    depends_on:
      - chromadb
    networks:
      - infra-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: infra-diagram-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - infra-net

  chromadb:
    image: chromadb/chroma:latest
    container_name: infra-diagram-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - infra-net

volumes:
  chroma_data:
  diagram_output:

networks:
  infra-net:
    driver: bridge
