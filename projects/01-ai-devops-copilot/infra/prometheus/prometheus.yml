global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ai-devops-copilot'

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'fastapi-backend'

  - job_name: 'chromadb'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['chromadb:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'chromadb'
